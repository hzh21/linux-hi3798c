- name: Quick Compile DTB Only
      run: |
        # 1. 定义变量 (对应你 Makefile 里的设置)
        KDIR="linux-5.10"
        KCFG="sn1-5.10.config"
        CROSS_GCC="aarch64-linux-gnu-"
        
        # 2. 准备内核配置 (.config)
        echo ">>> 正在准备内核配置..."
        cp -f $KCFG $KDIR/.config
        make -C $KDIR CROSS_COMPILE=$CROSS_GCC ARCH=arm64 olddefconfig
        
        # 3. 仅编译设备树 (这步通常只要 10-20 秒)
        echo ">>> 正在编译设备树 (dtbs)..."
        make -C $KDIR CROSS_COMPILE=$CROSS_GCC ARCH=arm64 dtbs
        
        # 4. 收集产物
        mkdir -p output/
        # 这里的路径对应你 Makefile 里的 hisilicon/hi3798cv200-imou-sn1.dtb
        cp $KDIR/arch/arm64/boot/dts/hisilicon/hi3798cv200-imou-sn1.dtb output/is-s10.dtb
        echo ">>> 编译完成，产物已放入 output/is-s10.dtb"
