name: Build IS-S10 Quick DTB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build Mode (quick_dtb / full)'
        required: true
        default: 'quick_dtb'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Build Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu device-tree-compiler bc bison flex make

    - name: Compile
      run: |
        # 定义变量
        KDIR="linux-5.10"
        KCFG="sn1-5.10.config"
        CROSS_GCC="aarch64-linux-gnu-"
        export ARCH=arm64
        export CROSS_COMPILE=$CROSS_GCC

        # 准备配置
        echo ">>> Preparing kernel config..."
        cp -f $KCFG $KDIR/.config
        make -C $KDIR olddefconfig

        # 根据模式编译
        if [[ "${{ github.event.inputs.build_mode }}" == "quick_dtb" ]] || [[ "${{ github.event_name }}" == "push" ]]; then
          echo ">>> Fast mode: Compiling DTBS only..."
          make -C $KDIR dtbs
          mkdir -p output/
          find $KDIR/arch/arm64/boot/dts/hisilicon/ -name "*.dtb" -exec cp {} output/ \;
        else
          echo ">>> Full mode: Compiling Image and Modules..."
          make -C $KDIR -j$(nproc) Image modules dtbs
          mkdir -p output/
          cp $KDIR/arch/arm64/boot/Image output/
          find $KDIR/arch/arm64/boot/dts/hisilicon/ -name "*.dtb" -exec cp {} output/ \;
        fi

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: is-s10-build-output
        path: output/
        retention-days: 1
