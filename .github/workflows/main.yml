name: Build IS-S10 Quick DTB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_mode:
        description: '选择编译模式 (quick_dtb / full)'
        required: true
        default: 'quick_dtb'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Build Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1 # 瘦身：只拉取最新提交，不拉取完整历史

    - name: Install Dependencies
      run: |
        sudo apt-get update
        # 仅安装必要依赖，去掉内核编译需要的一些重型库
        sudo apt-get install -y gcc-aarch64-linux-gnu device-tree-compiler bc bison flex make

    - name: Compile
      run: |
        # 如果是手动触发且选择了 quick_dtb，或者你是推送到分支进行调试
        if [[ "${{ github.event.inputs.build_mode }}" == "quick_dtb" ]] || [[ "${{ github.event_name }}" == "push" ]]; then
          echo ">>> 执行极速模式：仅编译设备树 <<<"
          # 假设你的内核 Makefile 支持 dtbs 目标，通常内核编译命令如下：
          # 注意：这里需要先进行简单的配置以生成必要的 include 链接，但跳过核心编译
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- poplar_defconfig # 这里换成你的 defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- dtbs
          
          # 创建输出目录并只拷贝 dtb
          mkdir -p output/
          find arch/arm64/boot/dts/hisilicon/ -name "*.dtb" -exec cp {} output/ \;
        else
          echo ">>> 执行完整模式：编译内核、模块及设备树 <<<"
          make all
        fi

    - name: Upload DTB Only
      uses: actions/upload-artifact@v4
      with:
        name: is-s10-dtb-debug
        # 仅上传 dtb 文件，加快打包和下载速度
        path: output/*.dtb
        retention-days: 1
